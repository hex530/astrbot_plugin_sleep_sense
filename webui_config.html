<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>sleep_sense 配置面板</title>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<style>
  body { font-family: sans-serif; background: #0d0f14; color: #d4daf0; padding: 20px; }
  .section { background: #141720; border: 1px solid #2a2f45; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
  textarea { width: 100%; background: #1c2030; color: #fff; border: 1px solid #2a2f45; padding: 10px; }
  .btn { padding: 10px 20px; cursor: pointer; background: #7eb8f7; color: #000; border: none; border-radius: 4px; }
</style>
</head>
<body>
  <h1>sleep_sense 配置面板 v1.2.0</h1>
  <div class="section">
    <h3>配置内容 (YAML)</h3>
    <textarea id="config-editor" rows="15"></textarea>
  </div>
  <div class="section">
    <h3>提示词内容 (YAML)</h3>
    <textarea id="prompts-editor" rows="10"></textarea>
  </div>
  <button class="btn" onclick="save()">💾 保存配置</button>
  <div id="status"></div>

<script>
  // 核心：由机器人注入初始数据
  const INITIAL_DATA = null;

  window.onload = () => {
    if (INITIAL_DATA) {
      document.getElementById('config-editor').value = jsyaml.dump(INITIAL_DATA.config);
      document.getElementById('prompts-editor').value = jsyaml.dump(INITIAL_DATA.prompts);
      document.getElementById('status').textContent = '✅ 数据加载成功';
    } else {
      document.getElementById('status').textContent = '❌ 未能获取到初始数据';
    }
  };

  async function save() {
    const status = document.getElementById('status');
    status.textContent = '⏳ 正在保存...';
    try {
      const response = await fetch(window.location.href, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'save_config',
          config: jsyaml.load(document.getElementById('config-editor').value),
          prompts: jsyaml.load(document.getElementById('prompts-editor').value)
        })
      });
      const result = await response.json();
      if (result.status === 'success') {
        status.textContent = '✅ 保存成功！';
      } else {
        throw new Error(result.message);
      }
    } catch (e) {
      status.textContent = '❌ 保存失败: ' + e.message;
    }
  }
</script>
</body>
</html>
